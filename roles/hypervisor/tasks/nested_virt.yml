---
- name: Detect CPU vendor
  ansible.builtin.command: grep -m1 -oP '(Intel|AMD)' /proc/cpuinfo
  register: hypervisor_cpu_vendor
  changed_when: false
  failed_when: hypervisor_cpu_vendor.rc != 0

- name: Set KVM module name
  ansible.builtin.set_fact:
    hypervisor_kvm_module: "{{ 'kvm_intel' if 'Intel' in hypervisor_cpu_vendor.stdout else 'kvm_amd' }}"

- name: Configure nested virtualization in modprobe
  ansible.builtin.template:
    src: kvm.conf.j2
    dest: /etc/modprobe.d/kvm.conf
    mode: "0644"

- name: Check if nested virtualization is active
  ansible.builtin.command: "cat /sys/module/{{ hypervisor_kvm_module }}/parameters/nested"
  register: hypervisor_nested_status
  changed_when: false
  failed_when: false

- name: Warn if nested virtualization requires reboot
  ansible.builtin.debug:
    msg: >-
      Nested virtualization is configured but not active.
      A reboot or module reload is required.
  when: hypervisor_nested_status.stdout | default('') not in ['1', 'Y']
