---
- name: Detect CPU vendor
  ansible.builtin.command: grep -m1 -oP '(Intel|AMD)' /proc/cpuinfo
  register: cpu_vendor_raw
  changed_when: false
  failed_when: cpu_vendor_raw.rc != 0

- name: Set KVM module name
  ansible.builtin.set_fact:
    kvm_module: "{{ 'kvm_intel' if 'Intel' in cpu_vendor_raw.stdout else 'kvm_amd' }}"

- name: Configure nested virtualization in modprobe
  ansible.builtin.template:
    src: kvm.conf.j2
    dest: /etc/modprobe.d/kvm.conf
    mode: "0644"

- name: Check if nested virtualization is active
  ansible.builtin.command: "cat /sys/module/{{ kvm_module }}/parameters/nested"
  register: nested_status
  changed_when: false
  failed_when: false

- name: Warn if nested virtualization requires reboot
  ansible.builtin.debug:
    msg: >-
      Nested virtualization is configured but not active.
      A reboot or module reload is required.
  when: nested_status.stdout | default('') not in ['1', 'Y']
