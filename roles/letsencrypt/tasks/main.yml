---
- name: Validate Let's Encrypt prerequisites
  ansible.builtin.assert:
    that:
      - duckdns_token is defined and (duckdns_token | length > 0)
      - letsencrypt_email is defined and (letsencrypt_email | length > 0)
    fail_msg: >-
      enable_letsencrypt is true but duckdns_token (vault) and/or
      letsencrypt_email are not set. A publicly resolvable domain
      (e.g. <cluster_name>.duckdns.org) is also required.

- name: Ensure python3-cryptography is present
  # Required on the target by the community.crypto OpenSSL/ACME modules.
  ansible.builtin.dnf:
    name: python3-cryptography
    state: present

- name: Ensure certificate directory exists
  ansible.builtin.file:
    path: "{{ letsencrypt_certs_dir }}/{{ domain }}"
    state: directory
    mode: "0700"

- name: Generate ACME account private key
  community.crypto.openssl_privatekey:
    path: "{{ letsencrypt_certs_dir }}/account.key"
    type: RSA
    size: 4096
    mode: "0600"

- name: Generate certificate private key
  community.crypto.openssl_privatekey:
    path: "{{ letsencrypt_certs_dir }}/{{ domain }}/cert.key"
    type: RSA
    size: 4096
    mode: "0600"

- name: Generate CSR for the apps wildcard
  community.crypto.openssl_csr:
    path: "{{ letsencrypt_certs_dir }}/{{ domain }}/cert.csr"
    privatekey_path: "{{ letsencrypt_certs_dir }}/{{ domain }}/cert.key"
    subject_alt_name: "DNS:*.apps.{{ domain }}"
    mode: "0644"

- name: Request ACME DNS-01 challenge
  community.crypto.acme_certificate:
    account_key_src: "{{ letsencrypt_certs_dir }}/account.key"
    account_email: "{{ letsencrypt_email }}"
    src: "{{ letsencrypt_certs_dir }}/{{ domain }}/cert.csr"
    cert: "{{ letsencrypt_certs_dir }}/{{ domain }}/cert.crt"
    challenge: dns-01
    acme_directory: "{{ letsencrypt_acme_directory }}"
    acme_version: "{{ letsencrypt_acme_version }}"
    remaining_days: "{{ letsencrypt_remaining_days }}"
    terms_agreed: true
  register: letsencrypt_challenge

# challenge_data_dns is populated only when a new/renewed cert is needed.
# When the existing cert is still valid it is empty and the remaining
# steps are skipped, making the role idempotent.
- name: Publish DNS-01 challenge TXT to DuckDNS
  ansible.builtin.uri:
    url: >-
      https://www.duckdns.org/update?domains={{ letsencrypt_duckdns_subdomain }}&token={{ duckdns_token }}&txt={{ item.value | first }}
    return_content: true
  loop: "{{ letsencrypt_challenge.challenge_data_dns | default({}) | dict2items }}"
  register: letsencrypt_duckdns
  changed_when: true
  failed_when: "'OK' not in letsencrypt_duckdns.content"
  no_log: true
  when: letsencrypt_challenge.challenge_data_dns | default({}) | length > 0

- name: Wait for DNS propagation
  ansible.builtin.pause:
    seconds: "{{ letsencrypt_dns_propagation_seconds | int }}"
  when: letsencrypt_challenge.challenge_data_dns | default({}) | length > 0

- name: Validate challenge and retrieve certificate
  community.crypto.acme_certificate:
    account_key_src: "{{ letsencrypt_certs_dir }}/account.key"
    account_email: "{{ letsencrypt_email }}"
    src: "{{ letsencrypt_certs_dir }}/{{ domain }}/cert.csr"
    cert: "{{ letsencrypt_certs_dir }}/{{ domain }}/cert.crt"
    fullchain: "{{ letsencrypt_certs_dir }}/{{ domain }}/fullchain.crt"
    chain: "{{ letsencrypt_certs_dir }}/{{ domain }}/intermediate.crt"
    challenge: dns-01
    acme_directory: "{{ letsencrypt_acme_directory }}"
    acme_version: "{{ letsencrypt_acme_version }}"
    remaining_days: "{{ letsencrypt_remaining_days }}"
    data: "{{ letsencrypt_challenge }}"
  when: letsencrypt_challenge.challenge_data_dns | default({}) | length > 0

- name: Create or update the apps TLS secret
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      oc --kubeconfig {{ letsencrypt_kubeconfig }} create secret tls apps-certs
      --cert={{ letsencrypt_certs_dir }}/{{ domain }}/fullchain.crt
      --key={{ letsencrypt_certs_dir }}/{{ domain }}/cert.key
      -n openshift-ingress --dry-run=client -o yaml
      | oc --kubeconfig {{ letsencrypt_kubeconfig }} apply -f -
    executable: /usr/bin/bash
  register: letsencrypt_secret
  changed_when: "'unchanged' not in letsencrypt_secret.stdout"

- name: Patch default IngressController to use the certificate
  ansible.builtin.command:
    cmd: >-
      oc --kubeconfig {{ letsencrypt_kubeconfig }}
      patch ingresscontroller.operator/default --type=merge
      -p {{ _ingress_patch | quote }}
      -n openshift-ingress-operator
  vars:
    _ingress_patch: '{"spec":{"defaultCertificate":{"name":"apps-certs"}}}'
  register: letsencrypt_patch
  changed_when: "'patched' in letsencrypt_patch.stdout and 'no change' not in letsencrypt_patch.stdout"
