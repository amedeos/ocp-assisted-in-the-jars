---
- name: Enable IP forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    state: present
    reload: true

- name: DNAT port 443 to ingress VIP
  ansible.builtin.iptables:
    table: nat
    chain: PREROUTING
    in_interface: "{{ network_wan_interface }}"
    protocol: tcp
    destination_port: "443"
    jump: DNAT
    to_destination: "{{ vip.ingress }}:443"
    state: present
  notify: Save iptables

- name: DNAT port 6443 to API VIP
  ansible.builtin.iptables:
    table: nat
    chain: PREROUTING
    in_interface: "{{ network_wan_interface }}"
    protocol: tcp
    destination_port: "6443"
    jump: DNAT
    to_destination: "{{ vip.api }}:6443"
    state: present
  notify: Save iptables

# libvirt's NAT network firewall rejects new inbound connections to the guest
# network, which silently breaks the DNAT above. Re-allow the forwarded ports
# via a libvirt network hook so it survives network restarts and reboots.
- name: Ensure libvirt hooks directory exists (NAT mode)
  ansible.builtin.file:
    path: /etc/libvirt/hooks
    state: directory
    mode: "0755"
  when: network_mode == 'nat'

- name: Install libvirt network hook to allow forwarded ports (NAT mode)
  ansible.builtin.template:
    src: libvirt-network-hook.sh.j2
    dest: /etc/libvirt/hooks/network
    mode: "0755"
  when: network_mode == 'nat'

- name: Apply the libvirt forward-allow rules now (NAT mode)
  ansible.builtin.command: "/etc/libvirt/hooks/network {{ libvirt_network.name }} started begin -"
  register: network_portfw_allow
  changed_when: "'ADDED' in network_portfw_allow.stdout"
  when: network_mode == 'nat'
