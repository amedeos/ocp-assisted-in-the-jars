---
- name: Restart ceph
  ansible.builtin.command: cephadm shell -- ceph orch restart mon
  changed_when: true
  listen: Restart ceph

- name: Reload udev rules
  ansible.builtin.command:
    cmd: udevadm control --reload-rules
  changed_when: true

- name: Trigger udev on OSD devices
  ansible.builtin.command:
    cmd: "udevadm trigger --name-match={{ item }}"
  loop: "{{ ceph_osd_devices }}"
  changed_when: true

- name: Wait for udev to settle
  ansible.builtin.command:
    cmd: udevadm settle
  changed_when: false
