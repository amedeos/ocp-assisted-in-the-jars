---
- name: Display monitoring start message  # noqa: run-once[task]
  ansible.builtin.debug:
    msg:
      - "Monitoring control-plane VMs for Assisted Installer shutdown..."
      - "VMs will be restarted without discovery ISO once the installer shuts them off."
      - "This may take up to {{ (assisted_monitor_vm_retries | int * assisted_monitor_vm_delay | int / 60) | int }} minutes."
  run_once: true

- name: Wait for VM to be restarted without discovery ISO
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      state=$(virsh domstate "{{ item.name }}")
      cdrom_info=$(virsh domblklist "{{ item.name }}" --details | awk '$2 == "cdrom"')
      cdrom_target=$(echo "$cdrom_info" | awk '{ print $3 }')
      cdrom_source=$(echo "$cdrom_info" | awk '{ print $4 }')

      if [ "$state" = "shut off" ]; then
        if [ -n "$cdrom_target" ] && [ -n "$cdrom_source" ] && [ "$cdrom_source" != "-" ]; then
          virsh change-media "{{ item.name }}" "$cdrom_target" --eject --force 2>/dev/null || true
          echo "EJECTED discovery ISO from {{ item.name }}"
        fi
        virsh start "{{ item.name }}"
        echo "RESTARTED {{ item.name }} (booting from disk)"
        exit 1
      fi

      if [ "$state" = "running" ] && { [ -z "$cdrom_source" ] || [ "$cdrom_source" = "-" ]; }; then
        echo "READY {{ item.name }} is running without discovery ISO"
        exit 0
      fi

      echo "WAITING {{ item.name }} state=$state cdrom=$cdrom_source"
      exit 1
  loop: "{{ controlplane_nodes }}"
  delegate_to: "{{ item.hypervisor }}"
  register: assisted_monitor_vm_result
  until: assisted_monitor_vm_result.rc == 0
  retries: "{{ assisted_monitor_vm_retries }}"
  delay: "{{ assisted_monitor_vm_delay }}"
  changed_when: "'RESTARTED' in assisted_monitor_vm_result.stdout or 'EJECTED' in assisted_monitor_vm_result.stdout"

- name: Display VM restart results  # noqa: run-once[task]
  ansible.builtin.debug:
    msg: "All control-plane VMs restarted without discovery ISO. Waiting for SSH..."
  run_once: true

- name: Wait for SSH on control-plane-0
  ansible.builtin.wait_for:
    host: "{{ (controlplane_nodes | first).ip }}"
    port: 22
    delay: 30
    timeout: "{{ assisted_monitor_ssh_timeout }}"
  delegate_to: localhost
