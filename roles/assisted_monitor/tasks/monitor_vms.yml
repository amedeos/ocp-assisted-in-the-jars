---
- name: Display monitoring start message
  ansible.builtin.debug:
    msg:
      - "Waiting for API VIP {{ vip.api }}:6443 to become reachable..."
      - "This indicates the OpenShift installation is progressing."

- name: Wait for API VIP to be reachable
  ansible.builtin.wait_for:
    host: "{{ vip.api }}"
    port: 6443
    delay: 30
    timeout: "{{ assisted_monitor_ssh_timeout }}"
  become: false

- name: Display API VIP reachable message
  ansible.builtin.debug:
    msg: "API VIP {{ vip.api }}:6443 is reachable. Installation is progressing."

- name: Check and restart any shut-off control-plane VMs
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      state=$(virsh domstate "{{ item.name }}")
      if [ "$state" = "shut off" ]; then
        cdrom_info=$(virsh domblklist "{{ item.name }}" --details | awk '$2 == "cdrom"')
        cdrom_target=$(echo "$cdrom_info" | awk '{ print $3 }')
        cdrom_source=$(echo "$cdrom_info" | awk '{ print $4 }')
        if [ -n "$cdrom_target" ] && [ -n "$cdrom_source" ] && [ "$cdrom_source" != "-" ]; then
          virsh change-media "{{ item.name }}" "$cdrom_target" --eject --force --config 2>/dev/null || true
          echo "EJECTED ISO from {{ item.name }}"
        fi
        virsh start "{{ item.name }}"
        echo "RESTARTED {{ item.name }}"
      else
        echo "OK {{ item.name }} state=$state"
      fi
  loop: "{{ controlplane_nodes }}"
  delegate_to: "{{ item.hypervisor }}"
  register: assisted_monitor_vm_check
  changed_when: "'RESTARTED' in assisted_monitor_vm_check.stdout or 'EJECTED' in assisted_monitor_vm_check.stdout"
  failed_when: false

- name: Wait for SSH on control-plane-0
  ansible.builtin.wait_for:
    host: "{{ (controlplane_nodes | first).ip }}"
    port: 22
    delay: 30
    timeout: "{{ assisted_monitor_ssh_timeout }}"
  become: false
