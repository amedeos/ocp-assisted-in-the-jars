---
- name: Detect cluster version for ODF channel
  ansible.builtin.command:
    cmd: >-
      oc --kubeconfig {{ odf_kubeconfig_path }}
      get clusterversion version
      -o jsonpath='{.status.history[0].version}'
  register: odf_cluster_version
  changed_when: false

- name: Set ODF channel from cluster version
  ansible.builtin.set_fact:
    odf_channel: "stable-{{ odf_cluster_version.stdout.split('.')[:2] | join('.') }}"
  when: odf_channel_override is not defined

- name: Use user-defined ODF channel override
  ansible.builtin.set_fact:
    odf_channel: "{{ odf_channel_override }}"
  when: odf_channel_override is defined

- name: Display ODF channel
  ansible.builtin.debug:
    msg: "ODF channel: {{ odf_channel }} (cluster version: {{ odf_cluster_version.stdout }})"

- name: Get Ceph FSID
  ansible.builtin.command: ceph fsid
  register: odf_ceph_fsid_result
  changed_when: false
  delegate_to: ceph

- name: Get CephX key for OpenShift
  ansible.builtin.command: "ceph auth get-key {{ odf_ceph_client_name }}"
  register: odf_ceph_key_result
  changed_when: false
  delegate_to: ceph
  no_log: true

- name: Get Ceph admin key
  ansible.builtin.command: ceph auth get-key client.admin
  register: odf_ceph_admin_key_result
  changed_when: false
  delegate_to: ceph
  no_log: true

- name: Set Ceph connection facts
  ansible.builtin.set_fact:
    odf_ceph_fsid: "{{ odf_ceph_fsid_result.stdout }}"
    odf_ceph_key: "{{ odf_ceph_key_result.stdout }}"
    odf_ceph_admin_key: "{{ odf_ceph_admin_key_result.stdout }}"
    odf_ceph_mon_ip: "{{ (cluster_nodes | selectattr('role', 'eq', 'ceph') | first).ip }}"

- name: Create openshift-storage namespace
  ansible.builtin.command:
    cmd: "oc --kubeconfig {{ odf_kubeconfig_path }} create namespace {{ odf_namespace }}"
  register: odf_ns_create
  changed_when: "'created' in odf_ns_create.stdout"
  failed_when: odf_ns_create.rc != 0 and 'already exists' not in odf_ns_create.stderr

- name: Apply OperatorGroup
  ansible.builtin.command:
    cmd: "oc --kubeconfig {{ odf_kubeconfig_path }} apply -f -"
    stdin: "{{ lookup('template', 'operator-group.yml.j2') }}"
  register: odf_og_apply
  changed_when: "'created' in odf_og_apply.stdout or 'configured' in odf_og_apply.stdout"

- name: Apply Subscription
  ansible.builtin.command:
    cmd: "oc --kubeconfig {{ odf_kubeconfig_path }} apply -f -"
    stdin: "{{ lookup('template', 'subscription.yml.j2') }}"
  register: odf_sub_apply
  changed_when: "'created' in odf_sub_apply.stdout or 'configured' in odf_sub_apply.stdout"

- name: Wait for ODF operator to be ready
  ansible.builtin.command:
    cmd: >-
      oc --kubeconfig {{ odf_kubeconfig_path }}
      get csv -n {{ odf_namespace }}
      -o jsonpath='{.items[?(@.spec.displayName=="OpenShift Data Foundation")].status.phase}'
  register: odf_csv_status
  until: odf_csv_status.stdout == 'Succeeded'
  retries: 60
  delay: 15
  changed_when: false

- name: Apply Ceph connection secret
  ansible.builtin.command:
    cmd: "oc --kubeconfig {{ odf_kubeconfig_path }} apply -f -"
    stdin: "{{ lookup('template', 'ceph-connection.yml.j2') }}"
  register: odf_conn_apply
  changed_when: "'created' in odf_conn_apply.stdout or 'configured' in odf_conn_apply.stdout"
  no_log: true

- name: Apply Ceph RBD secrets
  ansible.builtin.command:
    cmd: "oc --kubeconfig {{ odf_kubeconfig_path }} apply -f -"
    stdin: "{{ lookup('template', 'ceph-rbd-secret.yml.j2') }}"
  register: odf_secret_apply
  changed_when: "'created' in odf_secret_apply.stdout or 'configured' in odf_secret_apply.stdout"
  no_log: true

- name: Wait for StorageCluster CRD to be available
  ansible.builtin.command:
    cmd: "oc --kubeconfig {{ odf_kubeconfig_path }} get crd storageclusters.ocs.openshift.io"
  register: odf_crd_check
  until: odf_crd_check.rc == 0
  retries: 60
  delay: 15
  changed_when: false

- name: Apply StorageCluster (external mode)
  ansible.builtin.command:
    cmd: "oc --kubeconfig {{ odf_kubeconfig_path }} apply -f -"
    stdin: "{{ lookup('template', 'storage-cluster.yml.j2') }}"
  register: odf_sc_apply
  changed_when: "'created' in odf_sc_apply.stdout or 'configured' in odf_sc_apply.stdout"

- name: Wait for StorageCluster to be ready
  ansible.builtin.command:
    cmd: >-
      oc --kubeconfig {{ odf_kubeconfig_path }}
      get storagecluster ocs-external-storagecluster
      -n {{ odf_namespace }}
      -o jsonpath='{.status.phase}'
  register: odf_sc_status
  until: odf_sc_status.stdout == 'Ready'
  retries: 60
  delay: 15
  changed_when: false

- name: Enable ODF console plugin
  ansible.builtin.command:
    cmd: >-
      oc --kubeconfig {{ odf_kubeconfig_path }}
      patch console.operator.openshift.io cluster
      --type json
      --patch '[{"op": "add", "path": "/spec/plugins/-", "value": "odf-console"}]'
  register: odf_console_plugin
  changed_when: "'patched' in odf_console_plugin.stdout"
  failed_when: >-
    odf_console_plugin.rc != 0 and
    'already exists' not in odf_console_plugin.stderr | default('')

- name: Set CephRBD StorageClass as default
  ansible.builtin.command:
    cmd: >-
      oc --kubeconfig {{ odf_kubeconfig_path }}
      annotate storageclass ocs-external-storagecluster-ceph-rbd
      storageclass.kubernetes.io/is-default-class=true
      --overwrite
  register: odf_default_sc
  changed_when: "'annotated' in odf_default_sc.stdout | default('')"

- name: Display StorageClasses
  ansible.builtin.command:
    cmd: "oc --kubeconfig {{ odf_kubeconfig_path }} get sc"
  register: odf_storage_classes
  changed_when: false

- name: Show available StorageClasses
  ansible.builtin.debug:
    var: odf_storage_classes.stdout_lines
