---
- name: Create network config directory
  ansible.builtin.tempfile:
    state: directory
    prefix: netcfg_
  register: netcfg_dir

- name: Generate network config for {{ vm.name }}
  ansible.builtin.copy:
    dest: "{{ netcfg_dir.path }}/baremetal.nmconnection"
    content: |
      [connection]
      id=baremetal
      type=ethernet
      autoconnect=true

      [ipv4]
      method=manual
      addresses={{ vm.ip }}/{{ baremetal_net.prefix }}
      gateway={{ baremetal_net.gateway }}
      dns={{ (cluster_nodes | selectattr('role', 'eq', 'utility') | first).ip }}
      dns-search={{ domain }}

      [ethernet]
      mac-address={{ vm.mac }}
      mtu={{ baremetal_net.mtu }}
    mode: "0600"

- name: Inject network config into {{ vm.name }} image
  ansible.builtin.command:
    cmd: >-
      virt-copy-in -a {{ image_dir }}/{{ supported_os }}-{{ vm.name }}.qcow2
      {{ netcfg_dir.path }}/baremetal.nmconnection
      /etc/NetworkManager/system-connections/
  changed_when: true

- name: Cleanup temp directory
  ansible.builtin.file:
    path: "{{ netcfg_dir.path }}"
    state: absent
