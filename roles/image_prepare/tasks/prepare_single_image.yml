---
- name: Check if golden image for {{ vm.name }} already exists
  ansible.builtin.stat:
    path: "{{ image_dir }}/{{ supported_os }}-{{ vm.name }}.qcow2"
  register: golden_image_stat

- name: Create empty disk for {{ vm.name }}
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2 -o preallocation=metadata
      {{ image_dir }}/{{ supported_os }}-{{ vm.name }}-empty.qcow2
      {{ vm.disk_gb }}G
  when: not golden_image_stat.stat.exists
  changed_when: true

- name: Expand base image into golden image for {{ vm.name }}
  ansible.builtin.command:
    cmd: >-
      virt-resize --expand /dev/sda4
      {{ image_dir }}/{{ supported_os }}-base.qcow2
      {{ image_dir }}/{{ supported_os }}-{{ vm.name }}-empty.qcow2
  when: not golden_image_stat.stat.exists
  changed_when: true

- name: Rename expanded image to golden image for {{ vm.name }}
  ansible.builtin.command:
    cmd: >-
      mv {{ image_dir }}/{{ supported_os }}-{{ vm.name }}-empty.qcow2
      {{ image_dir }}/{{ supported_os }}-{{ vm.name }}.qcow2
  when: not golden_image_stat.stat.exists
  changed_when: true
