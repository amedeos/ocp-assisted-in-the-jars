---
- name: Skip image preparation if no VMs assigned to this hypervisor
  ansible.builtin.debug:
    msg: "No utility/ceph VMs on {{ inventory_hostname }}, skipping image preparation"
  when: image_prepare_vms | length == 0

- name: Check if VMs are already running
  ansible.builtin.command: "virsh domstate {{ vm.name }}"
  register: image_prepare_vm_states
  changed_when: false
  failed_when: false
  loop: "{{ image_prepare_vms }}"
  loop_control:
    loop_var: vm
  when: image_prepare_vms | length > 0

- name: Determine if image preparation can be skipped
  ansible.builtin.set_fact:
    image_prepare_skip: >-
      {{ image_prepare_vm_states.results | default([]) |
         rejectattr('stdout', 'undefined') |
         selectattr('stdout', 'search', 'running') |
         list | length == image_prepare_vms | length }}
  when: image_prepare_vms | length > 0

- name: Skip image preparation when all VMs are already running
  ansible.builtin.debug:
    msg: "All VMs already running on {{ inventory_hostname }}, skipping image preparation"
  when: image_prepare_skip | default(false)

- name: Check which golden images already exist
  ansible.builtin.stat:
    path: "{{ image_dir }}/{{ supported_os }}-{{ vm.name }}.qcow2"
  register: image_prepare_golden_check
  loop: "{{ image_prepare_vms }}"
  loop_control:
    loop_var: vm
  when: not (image_prepare_skip | default(false))

- name: Determine which images need preparation
  ansible.builtin.set_fact:
    image_prepare_todo: >-
      {{ image_prepare_golden_check.results
         | selectattr('stat', 'defined')
         | selectattr('stat.exists', 'eq', false)
         | map(attribute='vm')
         | list }}
  when: not (image_prepare_skip | default(false))

- name: Skip if all golden images exist
  ansible.builtin.debug:
    msg: "All golden images already exist on {{ inventory_hostname }}, skipping"
  when: not (image_prepare_skip | default(false)) and image_prepare_todo | default([]) | length == 0

- name: Check if base image exists locally
  ansible.builtin.stat:
    path: "{{ image_location }}"
  register: image_prepare_base_stat
  when: not (image_prepare_skip | default(false)) and image_prepare_todo | default([]) | length > 0

- name: Fail if base image not found
  ansible.builtin.assert:
    that: image_prepare_base_stat.stat.exists
    fail_msg: >-
      RHEL base image not found at {{ image_location }}.
      Download it from access.redhat.com and place it there.
  when: not (image_prepare_skip | default(false)) and image_prepare_todo | default([]) | length > 0

- name: Copy base image to image directory
  ansible.builtin.copy:
    src: "{{ image_location }}"
    dest: "{{ image_dir }}/{{ supported_os }}-base.qcow2"
    remote_src: true
    force: false
    mode: "0644"
  when: not (image_prepare_skip | default(false)) and image_prepare_todo | default([]) | length > 0

- name: Prepare golden images
  ansible.builtin.include_tasks: prepare_single_image.yml
  loop: "{{ image_prepare_todo | default([]) }}"
  loop_control:
    loop_var: vm
  when: not (image_prepare_skip | default(false))

- name: Read SSH public key
  ansible.builtin.slurp:
    src: "{{ ssh_key_public }}"
  register: image_prepare_ssh_pub
  delegate_to: localhost
  become: false
  run_once: true
  when: not (image_prepare_skip | default(false))

- name: Customize golden images
  when: not (image_prepare_skip | default(false)) and image_prepare_todo | default([]) | length > 0
  block:
    - name: Customize golden images
      ansible.builtin.command:
        cmd: >-
          virt-customize -a {{ image_dir }}/{{ supported_os }}-{{ vm.name }}.qcow2
          --root-password password:"{{ secure_password }}"
          --ssh-inject "root:string:{{ image_prepare_ssh_pub.content | b64decode | trim }}"
          --selinux-relabel
          --run-command 'dnf remove cloud-init* -y || true'
      loop: "{{ image_prepare_todo }}"
      loop_control:
        loop_var: vm
      changed_when: true
      no_log: true

  rescue:
    - name: Image customization failed
      ansible.builtin.fail:
        msg: "virt-customize failed. Check that libguestfs-tools is installed."

- name: Inject network configuration
  ansible.builtin.include_tasks: inject_network.yml
  loop: "{{ image_prepare_todo | default([]) }}"
  loop_control:
    loop_var: vm
  when: not (image_prepare_skip | default(false))
