---
- name: Install dnsmasq
  ansible.builtin.dnf:
    name:
      - dnsmasq
      - dnsmasq-utils
      - bind-utils
    state: present

- name: Deploy dnsmasq configuration
  ansible.builtin.template:
    src: dnsmasq.conf.j2
    dest: /etc/dnsmasq.conf
    mode: "0644"
    backup: true
  notify: restart_dnsmasq

- name: Enable and start dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started

- name: Open DNS and DHCP ports in firewall
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - dns
    - dhcp
  failed_when: false

- name: Set utility DNS to localhost (use local dnsmasq)
  ansible.builtin.command:
    cmd: nmcli con mod baremetal ipv4.dns 127.0.0.1
  changed_when: true

- name: Reload network connection to apply DNS change
  ansible.builtin.command:
    cmd: nmcli con up baremetal
  changed_when: true
