---
- name: Create empty OS disks for control-plane VMs
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2 -o preallocation=metadata
      {{ hostvars[item.hypervisor].image_dir | default(image_dir) }}/{{ item.name }}.qcow2
      {{ vm_specs.controlplane.os_disk_gb }}G
    creates: "{{ hostvars[item.hypervisor].image_dir | default(image_dir) }}/{{ item.name }}.qcow2"
  loop: "{{ controlplane_nodes }}"
  delegate_to: "{{ item.hypervisor }}"
  changed_when: true

- name: Generate libvirt XML for control-plane VMs
  ansible.builtin.template:
    src: vm-domain.xml.j2
    dest: "/tmp/{{ item.name }}.xml"
    mode: "0600"
  vars:
    vm_name: "{{ item.name }}"
    vm_cpu: "{{ vm_specs.controlplane.cpu }}"
    vm_memory_mb: "{{ vm_specs.controlplane.memory_mb }}"
    vm_cpu_mode: "host-passthrough"
    vm_mac: "{{ item.mac }}"
    vm_image_dir: "{{ hostvars[item.hypervisor].image_dir | default(image_dir) }}"
    vm_bridge: "{{ hostvars[item.hypervisor].bridge_bm | default(bridge_bm) }}"
    vm_osd_disks: []
    vm_boot_cdrom: true
  loop: "{{ controlplane_nodes }}"
  delegate_to: "{{ item.hypervisor }}"

- name: Define control-plane VMs in libvirt
  ansible.builtin.command:
    cmd: "virsh define /tmp/{{ item.name }}.xml"
  register: virsh_define_cp
  changed_when: "'defined' in virsh_define_cp.stdout"
  failed_when: virsh_define_cp.rc != 0 and 'already exists' not in virsh_define_cp.stderr
  loop: "{{ controlplane_nodes }}"
  delegate_to: "{{ item.hypervisor }}"
