---
- name: Create empty OS disks for control-plane VMs
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2 -o preallocation=metadata
      {{ hostvars[item.hypervisor].image_dir | default(image_dir) }}/{{ item.name }}.qcow2
      {{ vm_specs.controlplane.os_disk_gb }}G
    creates: "{{ hostvars[item.hypervisor].image_dir | default(image_dir) }}/{{ item.name }}.qcow2"
  loop: "{{ controlplane_nodes }}"
  delegate_to: "{{ item.hypervisor }}"
  changed_when: true

- name: Check if control-plane VMs already exist
  ansible.builtin.command: "virsh dominfo {{ item.name }}"
  register: cp_vm_exists
  changed_when: false
  failed_when: false
  loop: "{{ controlplane_nodes }}"
  delegate_to: "{{ item.hypervisor }}"

- name: Create control-plane VMs with virt-install
  ansible.builtin.command:
    cmd: >-
      virt-install
      --name {{ item.item.name }}
      --os-variant {{ vm_specs.controlplane.os_variant }}
      --vcpus {{ vm_specs.controlplane.cpu }}
      --memory {{ vm_specs.controlplane.memory_mb }}
      --disk path={{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/{{ item.item.name }}.qcow2
      --cdrom {{ assisted.discovery_iso_path }}
      --boot cdrom,hd
      --network bridge={{ hostvars[item.item.hypervisor].bridge_bm | default(bridge_bm) }},mac={{ item.item.mac }},model=virtio
      --graphics vnc,listen=0.0.0.0
      --cpu host-passthrough
      --noautoconsole
  loop: "{{ cp_vm_exists.results }}"
  when: item.rc != 0
  delegate_to: "{{ item.item.hypervisor }}"
  changed_when: true
