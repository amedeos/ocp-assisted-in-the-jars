---
- name: Check if control-plane VMs already exist
  ansible.builtin.command: "virsh dominfo {{ item.name }}"
  register: vm_create_cp_exists
  changed_when: false
  failed_when: false
  loop: "{{ controlplane_nodes }}"
  delegate_to: "{{ item.hypervisor }}"

- name: Create empty OS disks for control-plane VMs
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2 -o preallocation=metadata
      {{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/{{ item.item.name }}.qcow2
      {{ vm_specs.controlplane.os_disk_gb }}G
    creates: "{{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/{{ item.item.name }}.qcow2"
  loop: "{{ vm_create_cp_exists.results }}"
  when: item.rc != 0
  delegate_to: "{{ item.item.hypervisor }}"
  changed_when: true

- name: Create control-plane VMs with virt-install
  ansible.builtin.command:
    cmd: >-
      virt-install
      --name {{ item.item.name }}
      --os-variant {{ vm_specs.controlplane.os_variant }}
      --vcpus {{ vm_specs.controlplane.cpu }}
      --memory {{ vm_specs.controlplane.memory_mb }}
      --disk path={{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/{{ item.item.name }}.qcow2
      --disk device=cdrom
      --boot hd,cdrom
      --import
      --network {{ _network_spec }},mac={{ item.item.mac }},model=virtio
      --graphics spice
      --cpu host-passthrough
      --noautoconsole
  vars:
    _network_spec: >-
      {{ 'network=' + libvirt_network.name
      if network_mode == 'nat'
      else 'bridge=' + (hostvars[item.item.hypervisor].bridge_bm | default(bridge_bm)) }}
  loop: "{{ vm_create_cp_exists.results }}"
  when: item.rc != 0
  delegate_to: "{{ item.item.hypervisor }}"
  changed_when: true
