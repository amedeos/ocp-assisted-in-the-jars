---
- name: Check if ceph VM already exists
  ansible.builtin.command: "virsh domstate {{ item.name }}"
  register: vm_create_ceph_exists
  changed_when: false
  failed_when: false
  loop: "{{ ceph_nodes }}"
  delegate_to: "{{ item.hypervisor }}"

- name: Copy golden image for ceph VM
  ansible.builtin.copy:
    src: "{{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/{{ supported_os }}-ceph.qcow2"
    dest: "{{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/ceph.qcow2"
    remote_src: true
    force: false
    mode: "0644"
  loop: "{{ vm_create_ceph_exists.results }}"
  when: item.rc != 0
  delegate_to: "{{ item.item.hypervisor }}"

- name: Create OSD disks for ceph VM
  ansible.builtin.command:
    cmd: >-
      qemu-img create -f qcow2
      {{ hostvars[item.0.hypervisor].image_dir | default(image_dir) }}/{{ item.0.name }}-osd-{{ idx + 1 }}.qcow2
      {{ item.1.size_gb }}G
    creates: "{{ hostvars[item.0.hypervisor].image_dir | default(image_dir) }}/{{ item.0.name }}-osd-{{ idx + 1 }}.qcow2"
  loop: "{{ ceph_nodes | product(vm_specs.ceph.osd_disks) | list }}"
  loop_control:
    index_var: idx
  delegate_to: "{{ item.0.hypervisor }}"
  changed_when: true

- name: Create ceph VM with virt-install
  ansible.builtin.command:
    cmd: >-
      virt-install
      --name {{ item.item.name }}
      --os-variant {{ vm_specs.ceph.os_variant }}
      --vcpus {{ vm_specs.ceph.cpu }}
      --memory {{ vm_specs.ceph.memory_mb }}
      --disk path={{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/{{ item.item.name }}.qcow2
      {% for osd in vm_specs.ceph.osd_disks %}
      --disk path={{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/{{ item.item.name }}-osd-{{ loop.index }}.qcow2
      {% endfor %}
      --import
      --network {{ _network_spec }},mac={{ item.item.mac }},model=virtio
      --graphics spice
      --cpu host-model
      --noautoconsole
  vars:
    _network_spec: >-
      {{ 'network=' + libvirt_network.name
      if network_mode == 'nat'
      else 'bridge=' + (hostvars[item.item.hypervisor].bridge_bm | default(bridge_bm)) }}
  loop: "{{ vm_create_ceph_exists.results }}"
  when: item.rc != 0
  delegate_to: "{{ item.item.hypervisor }}"
  changed_when: true

- name: Wait for ceph VM to be reachable via SSH
  ansible.builtin.wait_for:
    host: "{{ item.item.ip }}"
    port: 22
    delay: 10
    timeout: 300
  loop: "{{ vm_create_ceph_exists.results }}"
  when: item.stdout | default('') | trim != 'running'
