---
- name: Check if utility VM already exists
  ansible.builtin.command: "virsh domstate {{ item.name }}"
  register: vm_create_utility_exists
  changed_when: false
  failed_when: false
  loop: "{{ utility_nodes }}"
  delegate_to: "{{ item.hypervisor }}"

- name: Copy golden image for utility VM
  ansible.builtin.copy:
    src: "{{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/{{ supported_os }}-utility.qcow2"
    dest: "{{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/utility.qcow2"
    remote_src: true
    force: false
    mode: "0644"
  loop: "{{ vm_create_utility_exists.results }}"
  when: item.rc != 0
  delegate_to: "{{ item.item.hypervisor }}"

- name: Create utility VM with virt-install
  ansible.builtin.command:
    cmd: >-
      virt-install
      --name {{ item.item.name }}
      --os-variant {{ vm_specs.utility.os_variant }}
      --vcpus {{ vm_specs.utility.cpu }}
      --memory {{ vm_specs.utility.memory_mb }}
      --disk path={{ hostvars[item.item.hypervisor].image_dir | default(image_dir) }}/{{ item.item.name }}.qcow2
      --import
      --network {{ _network_spec }},mac={{ item.item.mac }},model=virtio
      --graphics vnc
      --cpu host-model
      --noautoconsole
  vars:
    _network_spec: >-
      {{ 'network=' + libvirt_network.name
      if network_mode == 'nat'
      else 'bridge=' + (hostvars[item.item.hypervisor].bridge_bm | default(bridge_bm)) }}
  loop: "{{ vm_create_utility_exists.results }}"
  when: item.rc != 0
  delegate_to: "{{ item.item.hypervisor }}"
  changed_when: true

- name: Wait for utility VM to be reachable via SSH
  ansible.builtin.wait_for:
    host: "{{ item.item.ip }}"
    port: 22
    delay: 10
    timeout: 300
  loop: "{{ vm_create_utility_exists.results }}"
  when: item.stdout | default('') | trim != 'running'
