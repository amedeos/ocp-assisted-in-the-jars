---
- name: Pre-flight validation
  ansible.builtin.import_playbook: preflight.yml
  tags: [preflight]

- name: Create SSH key
  ansible.builtin.import_playbook: 01-create-ssh-key.yml
  tags: [ssh-key]

- name: Prepare VM images
  ansible.builtin.import_playbook: 03-prepare-images.yml
  tags: [images]

- name: Create utility VM
  ansible.builtin.import_playbook: 04a-create-utility.yml
  tags: [create-utility]

- name: Configure SSH shortcuts for VMs
  ansible.builtin.import_playbook: 04c-ssh-config.yml
  tags: [ssh-config]

- name: Configure utility (DNS + DHCP)
  ansible.builtin.import_playbook: 05-configure-utility.yml
  tags: [configure-utility]

- name: Create ceph and control-plane VMs
  ansible.builtin.import_playbook: 04b-create-remaining-vms.yml
  tags: [create-vms]

- name: Configure Ceph storage
  ansible.builtin.import_playbook: 06-configure-ceph.yml
  tags: [configure-ceph]

- name: Boot control-plane nodes from discovery ISO
  ansible.builtin.import_playbook: 07-boot-control-planes.yml
  tags: [boot-control-planes]

- name: Monitor Assisted Installer and wait for cluster
  ansible.builtin.import_playbook: 07b-monitor-installation.yml
  tags: [monitor-installation]

- name: Post-install - setup oc client and kubeconfig
  ansible.builtin.import_playbook: 08-post-install.yml
  tags: [post-install]

- name: Configure ODF with external Ceph
  ansible.builtin.import_playbook: 09-configure-odf.yml
  tags: [configure-odf]

- name: Configure HTPasswd identity provider
  ansible.builtin.import_playbook: 10-configure-htpasswd.yml
  tags: [configure-htpasswd]
