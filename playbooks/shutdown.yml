---
- name: Check if VMs are already shut off
  hosts: hypervisors
  become: true
  gather_facts: false
  tasks:
    - name: Check all VM states  # noqa: run-once[task]
      ansible.builtin.command:
        cmd: "virsh domstate {{ item.name }}"
      register: shutdown_vm_states
      loop: "{{ cluster_nodes }}"
      delegate_to: "{{ item.hypervisor }}"
      changed_when: false
      failed_when: false
      run_once: true

    - name: Determine if all VMs are already off  # noqa: run-once[task]
      ansible.builtin.set_fact:
        shutdown_all_off: >-
          {{ shutdown_vm_states.results |
             rejectattr('stdout', 'undefined') |
             selectattr('stdout', 'search', 'shut off') |
             list | length == cluster_nodes | length }}
      run_once: true

    - name: Display skip message  # noqa: run-once[task]
      ansible.builtin.debug:
        msg: "All VMs are already shut off, nothing to do."
      when: shutdown_all_off | bool
      run_once: true

- name: Pre-shutdown Ceph health check
  hosts: ceph_vms
  become: true
  gather_facts: false
  tasks:
    - name: Check Ceph health is HEALTH_OK
      ansible.builtin.command:
        cmd: ceph health
      register: shutdown_ceph_health
      changed_when: false
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Display Ceph health status
      ansible.builtin.debug:
        msg: "Ceph health: {{ shutdown_ceph_health.stdout | trim }}"
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Fail if Ceph is not HEALTH_OK
      ansible.builtin.fail:
        msg: >-
          Ceph is not healthy. Current status: {{ shutdown_ceph_health.stdout | trim }}.
          Resolve Ceph health issues before shutting down the cluster.
      when: >-
        not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool) and
        shutdown_ceph_health.stdout | trim != 'HEALTH_OK'

- name: Pre-shutdown OpenShift health checks
  hosts: utility_vms
  become: true
  gather_facts: false
  vars:
    shutdown_kubeconfig_path: /root/kubeconfig-int
    shutdown_kubeconfig_src: /etc/kubernetes/static-pod-resources/kube-apiserver-certs/secrets/node-kubeconfigs/lb-int.kubeconfig
  tasks:
    - name: Check if kubeconfig exists
      ansible.builtin.stat:
        path: "{{ shutdown_kubeconfig_path }}"
      register: shutdown_kubeconfig_stat
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Fetch kubeconfig from control-plane-0 if missing
      when: >-
        not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool) and
        not (shutdown_kubeconfig_stat.stat.exists | default(true))
      block:
        - name: Copy SSH key for control-plane access
          ansible.builtin.copy:
            src: "{{ ssh_key_private }}"
            dest: /root/.ssh/cp_key
            mode: "0600"

        - name: Fetch kubeconfig via SSH
          ansible.builtin.command:
            cmd: >-
              ssh -i /root/.ssh/cp_key
              -o StrictHostKeyChecking=no
              -o UserKnownHostsFile=/dev/null
              -o ConnectTimeout=10
              core@{{ (controlplane_nodes | first).ip }}
              sudo cat {{ shutdown_kubeconfig_src }}
          register: shutdown_kubeconfig_fetch
          changed_when: false
          no_log: true

        - name: Save kubeconfig
          ansible.builtin.copy:
            content: "{{ shutdown_kubeconfig_fetch.stdout }}"
            dest: "{{ shutdown_kubeconfig_path }}"
            mode: "0600"
          no_log: true

    - name: Check cluster operators health
      ansible.builtin.command:
        cmd: >-
          oc --kubeconfig {{ shutdown_kubeconfig_path }}
          get co -o json
      register: shutdown_co
      changed_when: false
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Set degraded and progressing operator facts
      ansible.builtin.set_fact:
        shutdown_co_degraded: >-
          {{ (shutdown_co.stdout | from_json)['items'] |
             selectattr('status.conditions', 'defined') |
             map(attribute='status.conditions') | flatten |
             selectattr('type', 'eq', 'Degraded') |
             selectattr('status', 'eq', 'True') | list }}
        shutdown_co_progressing: >-
          {{ (shutdown_co.stdout | from_json)['items'] |
             selectattr('status.conditions', 'defined') |
             map(attribute='status.conditions') | flatten |
             selectattr('type', 'eq', 'Progressing') |
             selectattr('status', 'eq', 'True') | list }}
        shutdown_co_not_available: >-
          {{ (shutdown_co.stdout | from_json)['items'] |
             selectattr('status.conditions', 'defined') |
             map(attribute='status.conditions') | flatten |
             selectattr('type', 'eq', 'Available') |
             rejectattr('status', 'eq', 'True') | list }}
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Display cluster operators status
      ansible.builtin.debug:
        msg: "All cluster operators are healthy: Available=True, Progressing=False, Degraded=False."
      when: >-
        not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool) and
        shutdown_co_degraded | length == 0 and
        shutdown_co_progressing | length == 0 and
        shutdown_co_not_available | length == 0

    - name: Fail if cluster operators are degraded or progressing
      ansible.builtin.fail:
        msg: >-
          Cluster operators are not healthy.
          Degraded: {{ shutdown_co_degraded | length }},
          Progressing: {{ shutdown_co_progressing | length }},
          Not Available: {{ shutdown_co_not_available | length }}.
          Resolve cluster operator issues before shutting down.
      when: >-
        not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool) and
        (shutdown_co_degraded | length > 0 or
         shutdown_co_progressing | length > 0 or
         shutdown_co_not_available | length > 0)

    - name: Check for pending CSRs
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail &&
          oc --kubeconfig {{ shutdown_kubeconfig_path }}
          get csr --no-headers 2>/dev/null |
          grep -c Pending || echo 0
      register: shutdown_csr_pending
      changed_when: false
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Display CSR status
      ansible.builtin.debug:
        msg: "Pending CSRs: {{ shutdown_csr_pending.stdout | trim }}"
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Fail if there are pending CSRs
      ansible.builtin.fail:
        msg: >-
          Found {{ shutdown_csr_pending.stdout | trim }} pending CSR(s).
          Approve or resolve pending CSRs before shutting down the cluster.
      when: >-
        not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool) and
        (shutdown_csr_pending.stdout | trim | int) > 0

- name: Gracefully shut down OpenShift nodes
  hosts: utility_vms
  become: true
  gather_facts: false
  vars:
    shutdown_kubeconfig_path: /root/kubeconfig-int
    shutdown_delay_minutes: 2
  tasks:
    - name: Get OpenShift node names
      ansible.builtin.command:
        cmd: "oc --kubeconfig {{ shutdown_kubeconfig_path }} get nodes -o jsonpath='{.items[*].metadata.name}'"
      register: shutdown_node_names
      changed_when: false
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Display nodes to shut down
      ansible.builtin.debug:
        msg: "Nodes to shut down: {{ shutdown_node_names.stdout.split() }}"
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Pre-pull debug image on all nodes
      ansible.builtin.command:
        cmd: "oc --kubeconfig {{ shutdown_kubeconfig_path }} debug node/{{ item }} -- chroot /host echo ready"
      loop: "{{ shutdown_node_names.stdout.split() | default([]) }}"
      changed_when: false
      failed_when: false
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Schedule shutdown on all OpenShift nodes
      ansible.builtin.command:
        cmd: "oc --kubeconfig {{ shutdown_kubeconfig_path }} debug node/{{ item }} -- chroot /host shutdown -h {{ shutdown_delay_minutes }}"
      loop: "{{ shutdown_node_names.stdout.split() | default([]) }}"
      changed_when: true
      failed_when: false
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

    - name: Display shutdown scheduled message
      ansible.builtin.debug:
        msg: "Shutdown scheduled in {{ shutdown_delay_minutes }} minutes on all nodes. Waiting for VMs to power off..."
      when: not (hostvars[groups['hypervisors'][0]].shutdown_all_off | default(false) | bool)

- name: Wait for control-plane VMs to stop and shut down remaining VMs
  hosts: hypervisors
  become: true
  gather_facts: false
  tasks:
    - name: Wait for control-plane VMs to be shut off  # noqa: run-once[task]
      ansible.builtin.command:
        cmd: "virsh domstate {{ item.name }}"
      register: cp_shutdown_status
      until: cp_shutdown_status.stdout | trim == 'shut off'
      retries: 60
      delay: 10
      loop: "{{ controlplane_nodes }}"
      delegate_to: "{{ item.hypervisor }}"
      changed_when: false
      failed_when: false
      run_once: true
      when: not (shutdown_all_off | default(false) | bool)

    - name: Force off control-plane VMs still running  # noqa: run-once[task]
      community.libvirt.virt:
        name: "{{ item.item.name }}"
        state: destroyed
      loop: "{{ cp_shutdown_status.results | default([]) }}"
      when: >-
        not (shutdown_all_off | default(false) | bool) and
        item.stdout | default('') | trim != 'shut off'
      delegate_to: "{{ item.item.hypervisor }}"
      failed_when: false
      run_once: true

    - name: Shut down ceph VM  # noqa: run-once[task]
      community.libvirt.virt:
        name: "{{ item.name }}"
        state: shutdown
      loop: "{{ ceph_nodes }}"
      delegate_to: "{{ item.hypervisor }}"
      failed_when: false
      run_once: true
      when: not (shutdown_all_off | default(false) | bool)

    - name: Wait for ceph VM to be shut off  # noqa: run-once[task]
      ansible.builtin.command:
        cmd: "virsh domstate {{ item.name }}"
      register: ceph_shutdown_status
      until: ceph_shutdown_status.stdout | trim == 'shut off'
      retries: 30
      delay: 10
      loop: "{{ ceph_nodes }}"
      delegate_to: "{{ item.hypervisor }}"
      changed_when: false
      failed_when: false
      run_once: true
      when: not (shutdown_all_off | default(false) | bool)

    - name: Shut down utility VM  # noqa: run-once[task]
      community.libvirt.virt:
        name: "{{ item.name }}"
        state: shutdown
      loop: "{{ utility_nodes }}"
      delegate_to: "{{ item.hypervisor }}"
      failed_when: false
      run_once: true
      when: not (shutdown_all_off | default(false) | bool)

    - name: Wait for utility VM to be shut off  # noqa: run-once[task]
      ansible.builtin.command:
        cmd: "virsh domstate {{ item.name }}"
      register: utility_shutdown_status
      until: utility_shutdown_status.stdout | trim == 'shut off'
      retries: 30
      delay: 10
      loop: "{{ utility_nodes }}"
      delegate_to: "{{ item.hypervisor }}"
      changed_when: false
      failed_when: false
      run_once: true
      when: not (shutdown_all_off | default(false) | bool)
