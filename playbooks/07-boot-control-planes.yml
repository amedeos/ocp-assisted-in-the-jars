---
- name: Boot control-plane VMs from discovery ISO
  hosts: hypervisors
  become: true
  gather_facts: false
  tasks:
    - name: Confirm cluster creation on console.redhat.com  # noqa: run-once[task]
      ansible.builtin.pause:
        prompt: >-
          Before proceeding, ensure you have:
            1. Created the cluster on console.redhat.com (Assisted Installer)
            2. Added the SSH public key ({{ ssh_key_public }}) to the cluster configuration
            3. Generated the discovery ISO
            4. Copied the ISO to {{ assisted.discovery_iso_path }}
          Press ENTER to continue or Ctrl+C to abort
      run_once: true

    - name: Verify discovery ISO exists
      ansible.builtin.stat:
        path: "{{ assisted.discovery_iso_path }}"
      register: iso_stat

    - name: Fail if discovery ISO not found
      ansible.builtin.assert:
        that: iso_stat.stat.exists
        fail_msg: >-
          Discovery ISO not found at {{ assisted.discovery_iso_path }}.
          Download it from console.redhat.com and place it at that path.

    - name: Stop control-plane VMs before attaching ISO
      community.libvirt.virt:
        name: "{{ item.name }}"
        state: destroyed
      loop: "{{ controlplane_nodes }}"
      delegate_to: "{{ item.hypervisor }}"
      failed_when: false

    - name: Detect cdrom device target for control-plane VMs
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail &&
          virsh domblklist {{ item.name }} --details |
          awk '$2 == "cdrom" { print $3 }'
      register: cp_cdrom_targets
      loop: "{{ controlplane_nodes }}"
      delegate_to: "{{ item.hypervisor }}"
      changed_when: false

    - name: Insert discovery ISO into control-plane VMs
      ansible.builtin.command:
        cmd: >-
          virsh change-media {{ item.item.name }}
          {{ item.stdout | trim }}
          {{ assisted.discovery_iso_path }}
          --insert --config
      loop: "{{ cp_cdrom_targets.results }}"
      when: item.stdout | trim | length > 0
      delegate_to: "{{ item.item.hypervisor }}"
      register: cp_iso_insert
      changed_when: "'Successfully inserted' in cp_iso_insert.stdout | default('')"
      failed_when: >-
        cp_iso_insert.rc != 0 and
        'already' not in cp_iso_insert.stderr | default('')

    - name: Start control-plane VMs
      community.libvirt.virt:
        name: "{{ item.name }}"
        state: running
      loop: "{{ controlplane_nodes }}"
      delegate_to: "{{ item.hypervisor }}"

    - name: Display next steps  # noqa: run-once[task]
      ansible.builtin.debug:
        msg:
          - "Control-plane VMs are now booting from the discovery ISO."
          - "Next steps:"
          - "  1. Open console.redhat.com -> Assisted Installer"
          - "  2. Wait for all 3 hosts to appear and be discovered"
          - "  3. Configure the cluster (network, storage, etc.)"
          - "  4. Start the installation"
          - ""
          - "To monitor VM consoles:"
          - "  virsh console control-plane-0"
          - "  virsh console control-plane-1"
          - "  virsh console control-plane-2"
      run_once: true
